default_dirs:
  skills:
    - default: .agents/skills/
    - global: ~/.agents/skills/
    - claude: ~/.claude/skills/
  agents:
    - default: .agents/agents/
    - global: ~/.agents/agents/
  prompts:
    - default: .agents/commands/
    - global: ~/.agents/commands/

platforms:
  claude-code:
    skills: ~/.claude/skills/
  cursor:
    skills: ~/.cursor/skills/
  codex:
    skills: ~/.codex/skills/
  cline:
    skills: ~/.cline/skills/

library:
  skills:
    - name: split-branch
      description: Diff surgery for stacked PRs - splits branches at hunk level using dependency graph analysis
      source: https://github.com/OctavianTocan/skills/blob/main/skills/split-branch/SKILL.md

    - name: sweep
      description: Resolve PR review comments from any reviewer across one or many PRs
      source: https://github.com/OctavianTocan/skills/blob/main/skills/sweep/SKILL.md

    - name: userinterface-wiki
      description: UI/UX best practices for web interfaces. Covers 11 categories from animation principles to typography.
      source: https://github.com/raphaelsalaja/userinterface-wiki/blob/main/skills/SKILL.md

    - name: stop-slop
      description: Remove AI writing patterns from prose. Use when drafting, editing, or reviewing text to eliminate predictable AI tells.
      source: https://github.com/hardikpandya/stop-slop/blob/main/SKILL.md
  agents: []
  prompts: []
